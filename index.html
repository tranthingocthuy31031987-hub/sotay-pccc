<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Water PCCC</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f5f7;
    margin:0;
    padding:0;
    text-align:center;
}

.header{
    background:#d32f2f;
    color:white;
    padding:25px;
}

.login-box, .card{
    background:white;
    max-width:600px;
    margin:40px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
    width:80%;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    text-align:center;
}

button, .button{
    display:block;
    width:80%;
    margin:20px auto;
    padding:18px;
    background:#1976d2;
    color:white;
    border:none;
    text-decoration:none;
    text-align:center;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover, .button:hover{
    background:#1565c0;
}

#error{
    color:red;
    font-weight:bold;
}

#mainContent{
    display:none;
}

.footer{
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<h1>🔥 WATER PCCC</h1>
<p>Cổng điều hướng ứng dụng Apps Script</p>
</div>

<div class="login-box" id="loginBox">
<h2>🔒 NHẬP MÃ TRUY CẬP</h2>

<input type="password" id="passCode" placeholder="Nhập mã...">

<button onclick="checkCode()">XÁC NHẬN</button>

<p id="error"></p>
</div>

<div id="mainContent">

<div class="card">

<a class="button"
href="https://script.google.com/macros/s/AKfycbyjy9aTAZ-v0OYjT-51nJClRk-5iWBs7v05Yx6Vx1yOQGurODh8e33m240x75wo8ueU/exec"
target="_blank">
📚 SỔ TAY PCCC
</a>

<a class="button"
href="https://script.google.com/macros/s/AKfycbzRY8nH5ln8wDx3yB7mlj17Q-O5Pf-2gkCMZKphOK7k284M4pnkxz8c9dml1A4z6p9W/exec"
target="_blank">
📖 SỔ TAY NQCS
</a>

</div>

<div class="footer">
<p>Cập nhật: 31/05/2026</p>
<p>Designed by<br>Trần Thị Ngọc Thủy - PC07</p>
</div>

</div>

<script>
function checkCode(){
    var code = document.getElementById("passCode").value;

    if(code === "114"){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    }else{
        document.getElementById("error").innerText = "❌ Mã truy cập không đúng";
    }
}
</script>

</body>
</html>
